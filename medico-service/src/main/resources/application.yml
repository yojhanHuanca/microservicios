server:
  port: 8086

spring:
  application:
    name: medico-service
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/bd_medico?createDatabaseIfNotExist=true
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
